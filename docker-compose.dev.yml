version: "3.9"

services:

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ./backend/staticfiles:/app/backend/staticfiles
    entrypoint: "/app/entrypoints/dev/web.sh"
    depends_on:
      - db

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    depends_on:
      - db
    entrypoint: "/app/entrypoints/dev/celery.sh"

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    depends_on:
      - db
    entrypoint: "/app/entrypoints/dev/celery_beat.sh"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend/staticfiles:/usr/share/nginx/html/static
    depends_on:
      - web

volumes:
  pgdata:
  static_volume: