version: "3.9"

services:

  web:
    container_name: web
    depends_on:
      - db
      - redis
    env_file:
      - .env

  celery:
    container_name: celery
    depends_on:
      - db
      - redis
    env_file:
      - .env

  celery_beat:
    container_name: celery-beat
    depends_on:
      - db
      - redis
    env_file:
      - .env

  db:
    image: postgres:17
    container_name: db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  pgdata: