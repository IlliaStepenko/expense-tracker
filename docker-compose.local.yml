version: "3.9"

services:

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.local
    volumes:
      - .:/app
    entrypoint: "/app/entrypoints/local/web.sh"
    ports:
      - "8000:8000"

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.local
    volumes:
      - .:/app
    entrypoint: "/app/entrypoints/local/celery.sh"

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.local
    volumes:
      - .:/app
    entrypoint: "/app/entrypoints/local/celery_beat.sh"

  db:
    ports:
      - "${POSTGRES_PORT}:5432"